name: "🔨 Build Kernels — AIO"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"


on:
  schedule:
    - cron: '0 0 */5 * *'   # every 5 days — keeps GHA cache alive (evicts at 7d)
  workflow_dispatch:
    inputs:
      zip_mode:
        description: "ZIP packaging"
        type: choice
        options: [per-variant, aio, both]
        default: per-variant
      build_type:
        description: "Build type"
        type: choice
        options: [stable, testing]
        default: stable

permissions:
  contents: write

jobs:

  setup:
    name: "⏱️ Setup"
    runs-on: ubuntu-latest
    outputs:
      start_time: ${{ steps.ts.outputs.start_time }}
    steps:
      - id: ts
        run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

  build:
    name: "🔨 ${{ matrix.variant.name }}"
    needs: [setup]
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name:      "Moto-Ksun"
            source:    "moto"
            ksu:       "ksun"
            prefix:    "Moto_Ksun"
            artifact:  "moto-ksun"
            defconfig: "vendor/rtwo_defconfig"

          - name:      "Moto-SukiSU"
            source:    "moto"
            ksu:       "suki"
            prefix:    "Moto_SukiSU"
            artifact:  "moto-suki"
            defconfig: "vendor/rtwo_defconfig"

          - name:      "Moto-NoKSU"
            source:    "moto"
            ksu:       "none"
            prefix:    "Moto_NoKSU"
            artifact:  "moto-noksu"
            defconfig: "vendor/rtwo_defconfig"

    uses: ./.github/workflows/build-kernel.yml
    with:
      variant_name:  ${{ matrix.variant.name }}
      source_type:   ${{ matrix.variant.source }}
      ksu_type:      ${{ matrix.variant.ksu }}
      zip_prefix:    ${{ matrix.variant.prefix }}
      artifact_name: ${{ matrix.variant.artifact }}
      defconfig:     ${{ matrix.variant.defconfig }}
      build_type:    ${{ inputs.build_type || 'stable' }}
    secrets: inherit

  release:
    name: "📦 Package & Release"
    needs: [setup, build]
    if: success() && github.event_name != 'schedule'
    uses: ./.github/workflows/release.yml
    with:
      zip_mode:   ${{ inputs.zip_mode || 'per-variant' }}
      build_type: ${{ inputs.build_type || 'stable' }}
      start_time: ${{ needs.setup.outputs.start_time }}
      workflow_type: aio
    secrets: inherit

  notify-failure:
    name: "❌ Notify Failure"
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && needs.build.result == 'cancelled' && github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1
      - name: "📣 Telegram"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL:    "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RUN_NUMBER: "${{ github.run_number }}"
          BUILD_STATUS: "${{ needs.build.result }}"
        run: bash scripts/notify.sh failure
